<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom Night Shift</title>
<style>
    body {
        margin: 0;
        background: black;
        color: #0f0;
        font-family: monospace;
        overflow: hidden;
    }
    #timer{
        position:absolute;
        font-size: 50px;
        width:10px;
        height:1000px;
          z-index: 9999;
    }
    #game {
        position: relative;
        width: 100vw;
        height: 100vh;
    }

    /* Office View */
    #office {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url('office.png') center/cover no-repeat;
    }

    /* Camera Overlay */
    #cameraView {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url('cam1.png') center/cover no-repeat;
        display: none;
        filter: grayscale(100%) contrast(120%);
    }

    /* Static effect */
    #static {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url('static.gif');
        opacity: 0.2;
        display: none;
    }

    /* UI Panel */
    #ui {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 120px;
        background: rgba(0,0,0,0.7);
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    button {
        background: black;
        border: 2px solid #0f0;
        color: #0f0;
        padding: 10px;
        cursor: pointer;
    }

    /* Camera Map */
    #camMap {
        position: absolute;
        right: 10px;
        bottom: 140px;
        background: rgba(0,0,0,0.7);
        padding: 10px;
        display: none;
    }

    .camBtn {
        display: block;
        margin: 5px;
    }
</style>
</head>
<body>
<p id="timer">0</p>
<div id="game">

    <div id="office"></div>
    <div id="cameraView"></div>
    <div id="static"></div>

    <div id="camMap">
        <button class="camBtn" onclick="switchCam('cam1.jpg')">Cam 1</button>
        <button class="camBtn" onclick="switchCam('cam2.jpg')">Cam 2</button>
        <button class="camBtn" onclick="switchCam('cam3.jpg')">Cam 3</button>
    </div>

    <div id="ui">
        <button onclick="toggleDoor('left')">Left Door</button>
        <button onclick="toggleLight('left')">Left Light</button>
        <button onclick="toggleCamera()">Cameras</button>
        <button onclick="toggleLight('right')">Right Light</button>
        <button onclick="toggleDoor('right')">Right Door</button>
    </div>

</div>

<script>
    let doors = {
    left: false,  // false = open, true = closed
    right: false
};
let seconds = 0;
const display = document.getElementById("timer");

// Start automatically when page loads
setInterval(() => {
  seconds++;
  display.textContent = seconds;
}, 1000);
function toggleDoor(side) {
    doors[side] = !doors[side];

    console.log(side + " door is now " + (doors[side] ? "CLOSED" : "OPEN"));

    // Optional visual change
    document.getElementById("office").style.filter =
        doors.left || doors.right ? "brightness(70%)" : "brightness(100%)";
}
let cameraOpen = false;


/* Camera Toggle */
function toggleCamera() {
    cameraOpen = !cameraOpen;

    document.getElementById("cameraView").style.display = cameraOpen ? "block" : "none";
    document.getElementById("camMap").style.display = cameraOpen ? "block" : "none";
    document.getElementById("static").style.display = cameraOpen ? "block" : "none";
}

/* Switch Cameras */
function switchCam(img) {
    document.getElementById("cameraView").style.backgroundImage = `url(${img})`;

    // Static flicker
    document.getElementById("static").style.opacity = Math.random();
}

/* Door + Light placeholders */
function toggleDoor(side) {
    console.log(side + " door toggled");
}

function toggleLight(side) {
    console.log(side + " light toggled");
}
</script>

</body>
</html>
