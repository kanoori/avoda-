<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Five Night's At Makmal's</title>

</head>
<body>
<p id="timer">0</p>
<div id="game">

    <div id="office"></div>
    <div id="cameraView"></div>
    <div id="static"></div>

    <div id="camMap">
        <button class="camBtn" onclick="switchCam('cam1.jpg')">Cam 1</button>
        <button class="camBtn" onclick="switchCam('cam2.jpg')">Cam 2</button>
        <button class="camBtn" onclick="switchCam('cam3.jpg')">Cam 3</button>
    </div>

    <div id="ui">
        <button onclick="toggleDoor('left')">Left Door</button>
        <button onclick="toggleLight('left')">Left Light</button>
        <button onclick="toggleCamera()">Cameras</button>
        <button onclick="toggleLight('right')">Right Light</button>
        <button onclick="toggleDoor('right')">Right Door</button>
    </div>

</div>
<script src="script.js"></script>

</body>
</html>
