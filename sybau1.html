<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Five Night's At Makmal's</title>

</head>
<body>
<p id="timer">0</p>
<div id="game">

<div id="gameOverScreen" style="display:none;">
    <h1 id="gameOverText">Game Over</h1>
    <button onclick="restartGame()">Restart</button>
</div>

    <div id="office"></div>
    <div id="cameraView"></div>
    <div id="static"></div>

<div id="camMap">
    <button class="camBtn" onclick="switchCam(0)">Cam 1</button>
    <button class="camBtn" onclick="switchCam(1)">Cam 2</button>
    <button class="camBtn" onclick="switchCam(2)">Cam 3</button>
    <button class="camBtn" onclick="switchCam(3)">Cam 4</button>
    <button class="camBtn" onclick="switchCam(4)">Cam 5</button>
    <button class="camBtn" onclick="switchCam(5)">Cam 6</button>
    <button class="camBtn" onclick="switchCam(6)">Cam 7</button>
    <button class="camBtn" onclick="switchCam(7)">Cam 8</button>
    <button class="camBtn" onclick="switchCam(8)">Cam 9</button>
    <button class="camBtn" onclick="switchCam(9)">Cam 10</button>
    <button class="camBtn" onclick="switchCam(10)">Cam 11</button>
</div>

    <div id="ui">
        <button onclick="toggleDoor('left')">Left Door</button>
        <button onclick="toggleLight('left')">Left Light</button>
        <button onclick="toggleCamera()">Cameras</button>
        <button onclick="toggleLight('right')">Right Light</button>
        <button onclick="toggleDoor('right')">Right Door</button>
    </div>

</div>
<script src="script.js"></script>

</body>
</html>
